name: Sync SQL to Supabase

on:
  push:
    paths:
      - 'data-sync.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PROJ_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      MGMT_TOKEN: ${{ secrets.SUPABASE_MGMT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Execute SQL on Supabase
        run: |
          PAYLOAD=$(python3 -c "import json,pathlib; print(json.dumps({'query': pathlib.Path('data-sync.sql').read_text()}))")
          RESPONSE=$(curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${PROJ_REF}/database/query" \
            -H "Authorization: Bearer ${MGMT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
import sys,json
try:
  d=json.load(sys.stdin)
  print('Sucesso:', d)
except:
  print('OK - sem resposta JSON')
"
