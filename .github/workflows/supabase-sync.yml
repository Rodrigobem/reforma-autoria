name: Sync SQL to Supabase

on:
  push:
    paths:
      - 'data-sync.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Execute SQL on Supabase
        run: |
          SQL=$(cat data-sync.sql)
          PAYLOAD=$(python3 -c "import sys,json; print(json.dumps({'query': open('data-sync.sql').read()}))")
          RESPONSE=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_MGMT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Supabase response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if isinstance(d, list):
    print('✅ SQL executado com sucesso! Linhas afetadas:', len(d))
elif 'error' in str(d).lower():
    print('❌ Erro:', d)
    sys.exit(1)
else:
    print('✅ OK:', d)
"
