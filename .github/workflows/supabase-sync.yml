name: Sync SQL to Supabase

on:
  push:
    paths:
      - 'data-sync.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PROJ_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      MGMT_TOKEN: ${{ secrets.SUPABASE_MGMT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Execute SQL on Supabase
        run: python3 sync.py
