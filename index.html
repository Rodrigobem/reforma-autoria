<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A365D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🏠 Reforma Autoria</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">

  <!-- Dependencies via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 540px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }

    .spin     { animation: spin .7s linear infinite; }
    .slide-up { animation: slideUp .25s ease; }
    .fade-in  { animation: fadeIn .3s ease; }

    /* ── Loading ────────────────────────────────────────── */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 14px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #BEE3F8;
      border-top-color: #2B6CB0;
      border-radius: 50%;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1A365D 0%, #2B6CB0 100%);
      padding: 18px 16px 14px;
      color: #fff;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .header-eyebrow {
      font-size: 10px; opacity:.65; letter-spacing:.12em;
      text-transform:uppercase; font-weight:700;
    }
    .header-title { font-size:17px; font-weight:800; letter-spacing:-.02em; margin-top:1px; }
    .header-amount { font-size:21px; font-weight:900; letter-spacing:-.03em; }
    .progress-wrap { margin-top:10px; }
    .progress-labels {
      display:flex; justify-content:space-between;
      font-size:10px; opacity:.75; margin-bottom:4px; font-weight:600;
    }
    .progress-track { background:rgba(255,255,255,.2); border-radius:99px; height:5px; }
    .progress-fill  { height:5px; border-radius:99px; transition:width .6s ease; }

    /* ── Content ────────────────────────────────────────── */
    .content { padding:14px; padding-bottom:88px; }

    /* ── Cards ──────────────────────────────────────────── */
    .card {
      background:#fff; border-radius:14px; padding:16px;
      box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:12px;
    }

    /* ── KPI grid ───────────────────────────────────────── */
    .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .kpi {
      background:#fff; border-radius:14px; padding:14px;
      box-shadow:0 1px 4px rgba(0,0,0,.07);
    }
    .kpi-icon  { font-size:20px; margin-bottom:5px; }
    .kpi-val   { font-size:17px; font-weight:900; letter-spacing:-.02em; }
    .kpi-label { font-size:11px; color:#718096; margin-top:3px; font-weight:600; }

    /* ── Pills ──────────────────────────────────────────── */
    .pill {
      display:inline-block; font-size:10px; font-weight:700;
      padding:3px 9px; border-radius:99px; white-space:nowrap;
    }
    .pills-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }

    /* ── Form ───────────────────────────────────────────── */
    .field { margin-bottom:14px; }
    .field-label {
      display:block; font-size:10px; font-weight:700; color:#718096;
      text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px;
    }
    .input {
      width:100%; padding:11px 13px;
      border:1.5px solid #E2E8F0; border-radius:9px;
      font-size:14px; font-family:inherit;
      background:#FAFAFA; outline:none; color:#1A202C;
      transition:border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .input:focus { border-color:#2B6CB0; box-shadow:0 0 0 3px #BEE3F8; }
    textarea.input { resize:none; }
    .input-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      padding:13px 18px; border:none; border-radius:12px;
      font-size:14px; font-weight:700; cursor:pointer;
      font-family:inherit; transition:opacity .15s; display:inline-block;
    }
    .btn:active { opacity:.85; }
    .btn-primary {
      background:linear-gradient(135deg,#1A365D,#2B6CB0);
      color:#fff; box-shadow:0 4px 14px rgba(43,108,176,.3);
    }
    .btn-secondary { background:#fff; color:#718096; border:1.5px solid #E2E8F0; }
    .btn-danger    { background:#FFF5F5; color:#C53030; border:1.5px solid #FED7D7; }
    .btn-sm        { padding:8px 14px; font-size:12px; border-radius:9px; }
    .btn-row       { display:flex; gap:10px; margin-top:14px; }

    /* ── Transaction Card ───────────────────────────────── */
    .tx-card {
      background:#fff; border-radius:14px; padding:14px;
      box-shadow:0 1px 4px rgba(0,0,0,.07);
      margin-bottom:10px; animation:slideUp .2s ease;
    }
    .tx-header { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
    .tx-desc   { font-size:13px; font-weight:700; color:#1A202C; line-height:1.35; }
    .tx-supplier { font-size:11px; color:#718096; margin-top:3px; }
    .tx-amount { font-size:16px; font-weight:900; color:#1A365D; text-align:right; flex-shrink:0; }
    .tx-paid   { font-size:10px; color:#B7791F; font-weight:600; }
    .tx-obs    {
      font-size:11px; color:#A0AEC0; margin-top:8px; line-height:1.45;
      border-top:1px solid #F7FAFC; padding-top:8px;
    }
    .tx-actions { display:flex; gap:8px; margin-top:10px; }

    /* ── PDF Drop Zone ──────────────────────────────────── */
    .pdf-drop {
      border:2px dashed #CBD5E0; border-radius:14px;
      padding:28px; text-align:center; cursor:pointer;
      background:#FAFAFA; transition:all .25s; margin-bottom:12px;
    }
    .pdf-drop:hover, .pdf-drop.over { border-color:#2B6CB0; background:#EBF8FF; }
    .pdf-drop.loading { border-color:#2B6CB0; background:#EBF8FF; pointer-events:none; }
    .pdf-ai-badge {
      margin-top:12px; font-size:11px; background:#BEE3F8; color:#2C5282;
      padding:5px 14px; border-radius:99px; display:inline-block; font-weight:700;
    }

    /* ── Nav ────────────────────────────────────────────── */
    .nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:540px; background:#fff;
      border-top:1px solid #E2E8F0; display:flex; align-items:center;
      padding-bottom:env(safe-area-inset-bottom,0px);
      box-shadow:0 -4px 16px rgba(0,0,0,.07); z-index:100;
    }
    .nav-btn {
      flex:1; padding:10px 0 8px; border:none; background:none;
      cursor:pointer; display:flex; flex-direction:column;
      align-items:center; gap:2px;
    }
    .nav-btn-icon  { font-size:22px; line-height:1; }
    .nav-btn-label { font-size:10px; letter-spacing:.01em; }
    .nav-indicator { width:20px; height:2px; background:#2B6CB0; border-radius:99px; margin-top:1px; }
    .nav-add-wrap  {
      width:46px; height:46px;
      background:linear-gradient(135deg,#1A365D,#2B6CB0);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      margin-top:-22px; box-shadow:0 4px 16px rgba(43,108,176,.45);
    }
    .nav-add-icon  { font-size:28px; color:#fff; font-weight:300; line-height:1; }

    /* ── Toast ──────────────────────────────────────────── */
    .toast {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      padding:10px 22px; border-radius:24px; font-size:13px; font-weight:700;
      z-index:9999; white-space:nowrap;
      box-shadow:0 4px 16px rgba(0,0,0,.2); animation:slideUp .25s ease;
    }

    /* ── Misc ───────────────────────────────────────────── */
    .section-title  { font-size:13px; font-weight:800; color:#1A365D; margin-bottom:14px; }
    .search-bar     { display:flex; gap:8px; margin-bottom:10px; }
    .filter-sel     { padding:11px 8px !important; max-width:130px; width:auto; }
    .total-bar      {
      display:flex; justify-content:space-between; align-items:center;
      padding:11px 16px; background:#fff; border-radius:12px;
      margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,.07);
    }
    .edit-banner    {
      background:#FEFCBF; border:1.5px solid #F6E05E; border-radius:10px;
      padding:10px 14px; font-size:13px; color:#744210;
      font-weight:700; margin-bottom:12px;
    }
    .empty {
      text-align:center; padding:48px 20px; color:#A0AEC0;
    }
    .empty-icon  { font-size:52px; margin-bottom:12px; }
    .empty-title { font-weight:700; font-size:15px; }
    .empty-sub   { font-size:12px; margin-top:4px; }

    /* ── Chart container ────────────────────────────────── */
    .chart-wrap { position:relative; }
  </style>
</head>
<body>

<div id="app">
  <div class="loading-screen">
    <div class="spinner spin"></div>
    <p style="color:#2B6CB0;font-weight:700;font-size:15px">Carregando reforma…</p>
  </div>
</div>

<!-- Hidden file input for PDF upload -->
<input type="file" id="pdfInput" accept="application/pdf"
  style="display:none" onchange="handlePdfFile(this.files[0]);this.value=''">

<script>
/* ══════════════════════════════════════════════════════════════
   ⚙️  CONFIGURAÇÃO — preencha com seus dados do Supabase
   ══════════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://jmqwxbfllvaizuydpeim.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3ATrJc5dTkijTW-iSRL5Qw_7l1-NIj1';

/* ══════════════════════════════════════════════════════════════
   CONSTANTES
   ══════════════════════════════════════════════════════════════ */
const SEGMENTOS = [
  'Alvenaria / Estrutura','Elétrica','Hidráulica','Gás',
  'Piso e Revestimento','Pintura','Marcenaria / Móveis Planejados',
  'Esquadrias / Vidros','Forro / Gesso','Eletrodomésticos','Mobiliário',
  'Iluminação / Lustres','Ar-Condicionado / Climatização',
  'Limpeza / Dedetização','Paisagismo / Jardinagem',
  'Decoração e Acabamentos','Mão de Obra Geral','Projeto / Arquitetura',
  'Taxas e Documentos','Outros'
];
const CENTROS = [
  'Sala de Estar','Sala de Jantar','Cozinha','Área de Serviço',
  'Quarto Principal','Quarto 2','Quarto 3',
  'Banheiro Principal','Banheiro Social','Lavabo',
  'Varanda / Terraço','Garagem','Área Gourmet',
  'Fachada / Área Externa','Geral / Toda a Casa'
];
const FORMAS     = ['Pix','Cartão de Crédito','Cartão de Débito','Boleto','Transferência','Dinheiro','Cheque'];
const STATUS_OPT = ['Pago à Vista','Parcelado em Andamento','Parcelado Quitado','Pendente','Cancelado'];

const STATUS_STYLE = {
  'Pago à Vista':           { bg:'#C6F6D5', c:'#22543D' },
  'Parcelado em Andamento': { bg:'#FEFCBF', c:'#744210' },
  'Parcelado Quitado':      { bg:'#BEE3F8', c:'#2A4365' },
  'Pendente':               { bg:'#FED7D7', c:'#742A2A' },
  'Cancelado':              { bg:'#EDF2F7', c:'#4A5568' },
};

const COLORS = ['#2B6CB0','#2F855A','#B7791F','#9B2C2C','#6B46C1','#0987A0','#276749','#C05621'];

/* ══════════════════════════════════════════════════════════════
   UTILITÁRIOS
   ══════════════════════════════════════════════════════════════ */
const fmt   = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const today = () => new Date().toLocaleDateString('pt-BR');
const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const esc   = s => String(s||'')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ══════════════════════════════════════════════════════════════
   ESTADO
   ══════════════════════════════════════════════════════════════ */
let S = {
  txs:       [],
  orc:       0,
  tab:       'dash',
  nomeProjeto: 'Reforma Authoria',
  editandoNome: false,         // 'dash' | 'list' | 'form' | 'settings'
  editId:    null,
  form:      emptyForm(),
  search:    '',
  segFilter: '',
  loading:   true,
  extracting:false,
  saving:    false,
  orcEdit:   false,
};

function emptyForm() {
  return {
    data:'', descricao:'', fornecedor:'',
    segmento:'', centro:'', forma:'Pix',
    valorTotal:'', parcelas:'1', valorParcela:'',
    status:'Pago à Vista', obs:''
  };
}

/* ══════════════════════════════════════════════════════════════
   API REST SUPABASE (fetch direto — compatível com qualquer chave)
   ══════════════════════════════════════════════════════════════ */
const H = () => ({
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
});

function initDB() {} // não precisa mais

async function sbFetch(path, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: { ...H(), ...(options.headers||{}) }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase ${res.status}: ${err}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadAll() {
  try {
    const [txData, orcData] = await Promise.all([
      sbFetch('reforma_transacoes?select=*&order=created_at.desc'),
      sbFetch('reforma_config?select=valor&chave=eq.orcamento')
    ]);
    S.txs = (txData||[]).map(rowToTx);
    S.orc = parseFloat(orcData?.[0]?.valor)||0;
  } catch(e) {
    console.error('Erro:', e);
    showToast('⚠️ Erro ao carregar: ' + e.message, 'err');
  }
  S.loading = false;
  render();
}

function rowToTx(row) {
  return {
    id:           row.id,
    data:         row.data || '',
    descricao:    row.descricao || '',
    fornecedor:   row.fornecedor || '',
    segmento:     row.segmento || '',
    centro:       row.centro || '',
    forma:        row.forma || '',
    valorTotal:   parseFloat(row.valor_total)||0,
    parcelas:     parseInt(row.parcelas)||1,
    valorParcela: parseFloat(row.valor_parcela)||0,
    totalPago:    parseFloat(row.total_pago)||0,
    status:       row.status || 'Pago à Vista',
    obs:          row.obs || '',
    createdAt:    row.created_at,
  };
}

function txToRow(tx) {
  return {
    id: tx.id, data: tx.data, descricao: tx.descricao, fornecedor: tx.fornecedor,
    segmento: tx.segmento, centro: tx.centro, forma: tx.forma,
    valor_total: tx.valorTotal, parcelas: tx.parcelas, valor_parcela: tx.valorParcela,
    total_pago: tx.totalPago, status: tx.status, obs: tx.obs,
    created_at: tx.createdAt || new Date().toISOString()
  };
}

async function upsertTx(tx) {
  const data = await sbFetch('reforma_transacoes', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(txToRow(tx))
  });
  if (S.editId) S.txs = S.txs.map(t => t.id===tx.id ? tx : t);
  else S.txs = [tx, ...S.txs];
}

async function deleteTxById(id) {
  await sbFetch(`reforma_transacoes?id=eq.${id}`, { method: 'DELETE' });
  S.txs = S.txs.filter(t => t.id!==id);
}

async function persistOrc(v) {
  await sbFetch('reforma_config', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ chave: 'orcamento', valor: String(v) })
  });
  S.orc = v;
}

/* ══════════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg, type='ok') {
  document.querySelectorAll('.toast').forEach(el=>el.remove());
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  el.style.cssText = `background:${type==='err'?'#C53030':'#22543D'};color:#fff`;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 3200);
}

/* ══════════════════════════════════════════════════════════════
   COMPUTED
   ══════════════════════════════════════════════════════════════ */
function kpis() {
  const totalPago = S.txs.reduce((s,t) => {
    if (t.status==='Pago à Vista'||t.status==='Parcelado Quitado') return s+t.valorTotal;
    if (t.status==='Parcelado em Andamento') return s+t.totalPago;
    return s;
  }, 0);
  const totalParc = S.txs.filter(t=>t.status==='Parcelado em Andamento')
    .reduce((s,t) => s+Math.max(0,t.valorTotal-t.totalPago), 0);
  const totalPend = S.txs.filter(t=>t.status==='Pendente')
    .reduce((s,t) => s+t.valorTotal, 0);
  const pct  = S.orc>0 ? Math.min(100,(totalPago/S.orc)*100) : 0;
  return { totalPago, totalParc, totalPend, saldo:S.orc-totalPago, pct };
}

function chartData() {
  const bySeg = SEGMENTOS.map(seg => ({
    label: seg.split('/')[0].trim().slice(0,16),
    full:  seg,
    val:   S.txs.filter(t=>t.segmento===seg).reduce((s,t)=>s+t.valorTotal,0)
  })).filter(d=>d.val>0).sort((a,b)=>b.val-a.val).slice(0,9);

  const byAmb = CENTROS.map(c => ({
    label: c.length>14 ? c.slice(0,14)+'…' : c,
    val:   S.txs.filter(t=>t.centro===c).reduce((s,t)=>s+t.valorTotal,0)
  })).filter(d=>d.val>0).sort((a,b)=>b.val-a.val);

  return { bySeg, byAmb };
}

function filtered() {
  return S.txs.filter(t => {
    const hay = [t.descricao,t.fornecedor,t.segmento,t.centro,t.forma].join(' ').toLowerCase();
    return (!S.search || hay.includes(S.search.toLowerCase()))
        && (!S.segFilter || t.segmento===S.segFilter);
  });
}

/* ══════════════════════════════════════════════════════════════
   CHARTS
   ══════════════════════════════════════════════════════════════ */
let _charts = {};

function destroyCharts() {
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch{} });
  _charts = {};
}

function buildChart(id, data) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (data.length===0) {
    canvas.style.display='none';
    const em = document.getElementById(id+'_empty');
    if (em) em.style.display='block';
    return;
  }
  _charts[id] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: data.map(d=>d.label),
      datasets: [{
        data: data.map(d=>d.val),
        backgroundColor: COLORS.slice(0,data.length).concat(COLORS).slice(0,data.length),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display:false },
        tooltip: {
          callbacks: {
            label: ctx => fmt(ctx.raw),
            title: ctx => data[ctx[0].dataIndex]?.full || ctx[0].label
          }
        }
      },
      scales: {
        x: { display:false },
        y: { grid:{display:false}, ticks:{ font:{size:11}, color:'#4A5568' } }
      }
    }
  });
}

function initCharts() {
  destroyCharts();
  const { bySeg, byAmb } = chartData();
  buildChart('segChart', bySeg);
  buildChart('ambChart', byAmb);
}

/* ══════════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  const k   = kpis();

  app.innerHTML = renderHeader(k) + `<div class="content fade-in">` +
    (S.tab==='dash'     ? renderDash(k)  :
     S.tab==='list'     ? renderList()   :
     S.tab==='form'     ? renderForm()   :
                          renderSettings()) +
    `</div>` + renderNav();

  if (S.tab==='dash') setTimeout(initCharts, 60);
  attachEvents();
}

/* ─── Header ──────────────────────────────────────────────────── */
function renderHeader(k) {
  return `
    <div class="header">
      <div class="header-row">
        <div>
          <div class="header-eyebrow">Controle Financeiro</div>
          <div class="header-title">🏠 Reforma Autoria</div>
        </div>
        <div style="text-align:right">
          <div class="header-eyebrow">Total Pago</div>
          <div class="header-amount">${fmt(k.totalPago)}</div>
        </div>
      </div>
      ${S.orc>0 ? `
        <div class="progress-wrap">
          <div class="progress-labels">
            <span>${k.pct.toFixed(1)}% utilizado</span>
            <span>Orçamento: ${fmt(S.orc)}</span>
          </div>
          <div class="progress-track">

   HANDLERS
   ══════════════════════════════════════════════════════════════ */
function attachEvents() {
  const drop = document.getElementById('pdfDrop');
  if (drop) {
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave',   () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => {
      e.preventDefault(); drop.classList.remove('over');
      handlePdfFile(e.dataTransfer.files[0]);
    });
  }
}

function setTab(tab)    { S.tab=tab; render(); }
function setOrcEdit(v)  { S.orcEdit=v; render(); }

function startNew() {
  S.form=emptyForm(); S.form.data=today();
  S.editId=null; S.tab='form'; render();
}

function startEdit(id) {

  if (!tx) return;
  S.form = {
    data:tx.data, descricao:tx.descricao, fornecedor:tx.fornecedor||'',
    segmento:tx.segmento||'', centro:tx.centro||'', forma:tx.forma||'Pix',
    valorTotal:String(tx.valorTotal||''), parcelas:String(tx.parcelas||1),
    valorParcela:String(tx.valorParcela||''), status:tx.status||'Pago à Vista', obs:tx.obs||''
  };
  S.editId=id; S.tab='form'; render();
}

function cancelForm() {
  S.form=emptyForm(); S.editId=null;
  S.tab='list'; render();
}

function updateSearch(v) {
  S.search=v;
  document.querySelector('.content').innerHTML = renderList();
  attachEvents();
}

function updateSegFilter(v) {
  S.segFilter=v;
  document.querySelector('.content').innerHTML = renderList();
  attachEvents();
}

function onStatusChange(val) {
  const el = document.getElementById('parcSection');
  if (el) el.style.display = val.includes('Parcelado') ? '' : 'none';

function onValorChange() {
  const vt = parseFloat(document.getElementById('f_valorTotal')?.value)||0;
  const pc = parseInt(document.getElementById('f_parcelas')?.value)||1;
  const vp = document.getElementById('f_valorParcela');
  if (vp && pc>1) vp.value = (vt/pc).toFixed(2);

function onParcelasChange() {
  const vt = parseFloat(document.getElementById('f_valorTotal')?.value)||0;
  const pc = parseInt(document.getElementById('f_parcelas')?.value)||1;
  const vp = document.getElementById('f_valorParcela');
  if (vp && vt>0) vp.value = (vt/pc).toFixed(2);
}

function readFormValues() {
  const g = id => document.getElementById(id)?.value||'';
  return {
    data:g('f_data'), descricao:g('f_descricao'), fornecedor:g('f_fornecedor'),
    segmento:g('f_segmento'), centro:g('f_centro'), forma:g('f_forma'),
    status:g('f_status'), valorTotal:g('f_valorTotal'),
    parcelas:g('f_parcelas'), valorParcela:g('f_valorParcela'), obs:g('f_obs')
  };
}

async function handleSave() {
  const f = readFormValues();
  if (!f.descricao.trim()||!f.valorTotal) {
    showToast('⚠️ Preencha Descrição e Valor','err'); return;
  }
  if (S.saving) return;
  S.saving=true;
  const btn=document.getElementById('saveBtn');
  if(btn) btn.textContent='Salvando…';

  const vt = parseFloat(f.valorTotal)||0;
  const pc = parseInt(f.parcelas)||1;
  const vp = parseFloat(f.valorParcela)||vt;
  const tp = f.status==='Pago à Vista'||f.status==='Parcelado Quitado' ? vt
           : f.status==='Parcelado em Andamento' ? Math.min(vp*pc, vt) : 0;

  const tx = {
    id: S.editId || uid(),
    data:f.data, descricao:f.descricao.trim(), fornecedor:f.fornecedor,
    segmento:f.segmento, centro:f.centro, forma:f.forma,
    valorTotal:vt, parcelas:pc, valorParcela:vp, totalPago:tp,
    status:f.status, obs:f.obs,
    createdAt: S.editId
      ? (S.txs.find(t=>t.id===S.editId)?.createdAt||new Date().toISOString())
      : new Date().toISOString()
  };

  try {
    await upsertTx(tx);
    showToast(S.editId?'✅ Atualizado!':'✅ Lançamento salvo!');
    S.form=emptyForm(); S.editId=null; S.tab='list';
  } catch(e) {
    showToast('⚠️ Erro ao salvar. Tente novamente.','err');
    console.error(e);
  }
  S.saving=false; render();
}

async function handlePdfFile(file) {
  if (!file||file.type!=='application/pdf') return;
  const apiKey = localStorage.getItem('anthropic_key');
  if (!apiKey) {
    showToast('⚠️ Configure a API Key em ⚙️ Config primeiro','err');
    S.tab='settings'; render(); return;
  }

  S.extracting=true; S.tab='form'; S.form=emptyForm(); S.form.data=today();
  S.editId=null; render();

  try {
    const b64 = await new Promise((res,rej) => {
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej; r.readAsDataURL(file);
    });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        messages:[{ role:'user', content:[
          {type:'document', source:{type:'base64',media_type:'application/pdf',data:b64}},
          {type:'text',text:'Analise este comprovante de pagamento brasileiro. Retorne SOMENTE JSON válido sem markdown:\n{"data":"DD/MM/YYYY","valor":0.00,"fornecedor":"nome do recebedor","forma":"Pix","numero_controle":""}'}
        ]}]
      })
    });

    const d = await resp.json();
    const txt = d.content?.find(b=>b.type==='text')?.text||'{}';
    const ex  = JSON.parse(txt.replace(/```json|```/g,'').trim());

    S.form.data         = ex.data         || S.form.data;
    S.form.fornecedor   = ex.fornecedor   || '';
    S.form.forma        = ex.forma        || 'Pix';
    S.form.valorTotal   = ex.valor        ? String(ex.valor) : '';
    S.form.valorParcela = ex.valor        ? String(ex.valor) : '';
    S.form.obs          = ex.numero_controle ? `Ctrl Pix: ${ex.numero_controle}` : '';

    showToast('✅ Comprovante lido! Confira e complemente os dados.');
  } catch(e) {
    showToast('⚠️ Erro ao ler PDF. Preencha manualmente.','err');
    console.error(e);
  }

  S.extracting=false; render();
}

async function salvarNome() {
  const input = document.getElementById('nomeInput');
  if (!input) return;
  const nome = input.value.trim() || 'Reforma Authoria';
  S.nomeProjeto = nome;
  S.editandoNome = false;
  await sbFetch('reforma_config', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ chave: 'nome_projeto', valor: nome })
  }).catch(()=>{});
  render();
}

loadAll();
