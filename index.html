<script>
const SUPABASE_URL = 'https://jmqwxbfllvaizuydpeim.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3ATrJc5dTkijTW-iSRL5Qw_7l1-NIj1';

const SEGMENTOS = ['Alvenaria / Estrutura','Elétrica','Hidráulica','Gás','Piso e Revestimento','Pintura','Marcenaria / Móveis Planejados','Esquadrias / Vidros','Forro / Gesso','Eletrodomésticos','Mobiliário','Iluminação / Lustres','Ar-Condicionado / Climatização','Limpeza / Dedetização','Paisagismo / Jardinagem','Decoração e Acabamentos','Mão de Obra Geral','Projeto / Arquitetura','Taxas e Documentos','Outros'];
const CENTROS = ['Sala de Estar','Sala de Jantar','Cozinha','Área de Serviço','Quarto Principal','Quarto 2','Quarto 3','Banheiro Principal','Banheiro Social','Lavabo','Varanda / Terraço','Garagem','Área Gourmet','Fachada / Área Externa','Geral / Toda a Casa'];
const FORMAS = ['Pix','Cartão de Crédito','Cartão de Débito','Boleto','Transferência','Dinheiro','Cheque'];
const STATUS_OPT = ['Pago à Vista','Parcelado em Andamento','Parcelado Quitado','Pendente','Cancelado'];
const CHART_COLORS = ['#2B6CB0','#2F855A','#B7791F','#9B2C2C','#6B46C1','#0987A0','#276749','#C05621'];
const STATUS_STYLE = {
  'Pago à Vista':{bg:'#C6F6D5',c:'#22543D'},
  'Parcelado em Andamento':{bg:'#FEFCBF',c:'#744210'},
  'Parcelado Quitado':{bg:'#BEE3F8',c:'#2A4365'},
  'Pendente':{bg:'#FED7D7',c:'#742A2A'},
  'Cancelado':{bg:'#EDF2F7',c:'#4A5568'},
};

const fmt = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const today = () => new Date().toLocaleDateString('pt-BR');
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const parseDate = str => { if(!str)return null; const[d,m,y]=str.split('/').map(Number); return new Date(y,m-1,d); };
const fmtMes = (y,m) => new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let S = {
  txs:[], orc:0, tab:'dash',
  editId:null, form:emptyForm(),
  search:'', segFilter:'',
  loading:true, extracting:false, saving:false,
  orcEdit:false, nomeProjeto:'Reforma Authoria', editandoNome:false,
  fluxoAno: new Date().getFullYear(), fluxoMes: new Date().getMonth()+1,
};

function emptyForm(){
  return {data:today(),descricao:'',fornecedor:'',segmento:'',centro:'',forma:'Pix',
    valorTotal:'',totalParcelas:'1',parcelasPagas:'1',valorParcela:'',
    dataPrimeiraParcela:'',status:'Pago à Vista',obs:'',cartaoNome:'',cartaoNumero:'',cartaoBandeira:'',cartaoVencimento:''};
}

// ── REST API ──────────────────────────────────────────────────────
const H = () => ({'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'});

function initDB(){}

async function sbFetch(path, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {...options, headers:{...H(),...(options.headers||{})}});
  if(!res.ok){const err=await res.text();throw new Error(`${res.status}: ${err}`);}
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadAll(){
  try {
    const[txData, orcData, nomeData] = await Promise.all([
      sbFetch('reforma_transacoes?select=*&order=created_at.desc'),
      sbFetch('reforma_config?select=valor&chave=eq.orcamento'),
      sbFetch('reforma_config?select=valor&chave=eq.nome_projeto'),
    ]);
    S.txs = (txData||[]).map(rowToTx);
    S.orc = parseFloat(orcData?.[0]?.valor)||0;
    if(nomeData?.[0]?.valor) S.nomeProjeto = nomeData[0].valor;
  } catch(e){
    console.error(e);
    showToast('⚠️ Erro ao carregar: '+e.message,'err');
  }
  S.loading=false; render();
}

function rowToTx(row){
  return {
    id:row.id, data:row.data||'', descricao:row.descricao||'',
    fornecedor:row.fornecedor||'', segmento:row.segmento||'',
    centro:row.centro||'', forma:row.forma||'',
    valorTotal:parseFloat(row.valor_total)||0,
    totalParcelas:parseInt(row.total_parcelas)||parseInt(row.parcelas)||1,
    parcelasPagas:parseInt(row.parcelas)||1,
    valorParcela:parseFloat(row.valor_parcela)||0,
    totalPago:parseFloat(row.total_pago)||0,
    status:row.status||'Pago à Vista',
    dataPrimeiraParcela:row.data_primeira_parcela||'',
    obs:row.obs||'', cartaoNome:row.cartao_nome||'', cartaoNumero:row.cartao_numero||'', cartaoBandeira:row.cartao_bandeira||'', cartaoVencimento:row.cartao_vencimento||'', createdAt:row.created_at,
  };
}

function txToRow(tx){
  return {
    id:tx.id, data:tx.data, descricao:tx.descricao, fornecedor:tx.fornecedor,
    segmento:tx.segmento, centro:tx.centro, forma:tx.forma,
    valor_total:tx.valorTotal, parcelas:tx.parcelasPagas,
    total_parcelas:tx.totalParcelas, valor_parcela:tx.valorParcela,
    total_pago:tx.totalPago, status:tx.status,
    data_primeira_parcela:tx.dataPrimeiraParcela||null, cartao_nome:tx.cartaoNome||null, cartao_numero:tx.cartaoNumero||null, cartao_bandeira:tx.cartaoBandeira||null, cartao_vencimento:tx.cartaoVencimento||null,
    obs:tx.obs, created_at:tx.createdAt||new Date().toISOString()
  };
}

async function upsertTx(tx){
  await sbFetch('reforma_transacoes',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(txToRow(tx))});
  if(S.editId) S.txs=S.txs.map(t=>t.id===tx.id?tx:t);
  else S.txs=[tx,...S.txs];
}

async function deleteTxById(id){
  await sbFetch(`reforma_transacoes?id=eq.${id}`,{method:'DELETE'});
  S.txs=S.txs.filter(t=>t.id!==id);
}

async function persistOrc(v){
  await sbFetch('reforma_config',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({chave:'orcamento',valor:String(v)})});
  S.orc=v;
}

// ── INSTALLMENTS ──────────────────────────────────────────────────
function getAllInstallments(){
  const all=[];
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  for(const tx of S.txs){
    if(!tx.status.includes('Parcelado')) continue;
    const total = tx.totalParcelas||1;
    const pagas = tx.parcelasPagas||0;
    if(!tx.dataPrimeiraParcela) continue;
    const[d,m,y] = tx.dataPrimeiraParcela.split('/').map(Number);
    for(let i=0;i<total;i++){
      const dt = new Date(y, m-1+i, d);
      const pago = i < pagas;
      const atrasado = !pago && dt < hoje;
      all.push({
        id:`${tx.id}-p${i+1}`, txId:tx.id,
        txDesc:tx.descricao, txFornecedor:tx.fornecedor,
        numero:i+1, total, dataVenc:dt,
        dataVencStr:dt.toLocaleDateString('pt-BR'),
        valor:tx.valorParcela, pago, atrasado,
      });
    }
  }
  return all.sort((a,b)=>a.dataVenc-b.dataVenc);
}

function getMonthlyFlow(){
  const map={};
  const add=(key,field,v)=>{ if(!map[key]) map[key]={paid:0,due:0,future:0}; map[key][field]+=v; };
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const keyOf=(y,m)=>`${y}-${String(m).padStart(2,'0')}`;

  for(const tx of S.txs){
    if(tx.status==='Pago à Vista'){
      const dt=parseDate(tx.data); if(!dt)continue;
      add(keyOf(dt.getFullYear(),dt.getMonth()+1),'paid',tx.valorTotal);
    }
  }
  for(const p of getAllInstallments()){
    const k=keyOf(p.dataVenc.getFullYear(),p.dataVenc.getMonth()+1);
    if(p.pago) add(k,'paid',p.valor);
    else if(p.atrasado) add(k,'due',p.valor);
    else add(k,'future',p.valor);
  }

  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>{
    const[y,m]=k.split('-').map(Number);
    return{key:k,year:y,month:m,label:`${MESES[m-1]} ${y}`,...v,total:v.paid+v.due+v.future};
  });
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type='ok'){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  clearTimeout(toastTimer);
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  el.style.cssText=`background:${type==='err'?'#C53030':'#22543D'};color:#fff`;
  document.body.appendChild(el);
  toastTimer=setTimeout(()=>el.remove(),3200);
}

// ── COMPUTED ──────────────────────────────────────────────────────
function kpis(){
  const totalPago=S.txs.reduce((s,t)=>{
    if(t.status==='Pago à Vista'||t.status==='Parcelado Quitado') return s+t.valorTotal;
    if(t.status==='Parcelado em Andamento') return s+t.totalPago;
    return s;
  },0);
  const totalParc=S.txs.filter(t=>t.status==='Parcelado em Andamento').reduce((s,t)=>s+Math.max(0,t.valorTotal-t.totalPago),0);
  const totalPend=S.txs.filter(t=>t.status==='Pendente').reduce((s,t)=>s+t.valorTotal,0);
  const pct=S.orc>0?Math.min(100,(totalPago/S.orc)*100):0;

  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const mesAtual=getAllInstallments().filter(p=>p.dataVenc.getMonth()===hoje.getMonth()&&p.dataVenc.getFullYear()===hoje.getFullYear());
  const vceMes=mesAtual.filter(p=>!p.pago&&!p.atrasado).reduce((s,p)=>s+p.valor,0);
  const atrasado=getAllInstallments().filter(p=>p.atrasado).reduce((s,p)=>s+p.valor,0);

  return{totalPago,totalParc,totalPend,saldo:S.orc-totalPago,pct,vceMes,atrasado};
}

// ── CHARTS ────────────────────────────────────────────────────────
let _charts={};
function destroyCharts(){Object.values(_charts).forEach(c=>{try{c.destroy()}catch{}});_charts={};}

function buildBarChart(id,data,labelField,valField){
  const canvas=document.getElementById(id); if(!canvas)return;
  if(!data.length){canvas.style.display='none';const em=document.getElementById(id+'_empty');if(em)em.style.display='block';return;}
  _charts[id]=new Chart(canvas,{type:'bar',data:{
    labels:data.map(d=>d[labelField]),
    datasets:[{data:data.map(d=>d[valField]),backgroundColor:CHART_COLORS.slice(0,data.length).concat(CHART_COLORS).slice(0,data.length),borderRadius:6,borderSkipped:false}]
  },options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{x:{display:false},y:{grid:{display:false},ticks:{font:{size:11},color:'#4A5568'}}}}});
}

function buildFlowChart(id,flowData){
  const canvas=document.getElementById(id); if(!canvas)return;
  if(!flowData.length)return;
  _charts[id]=new Chart(canvas,{type:'bar',data:{
    labels:flowData.map(d=>d.label),
    datasets:[
      {label:'Pago',data:flowData.map(d=>d.paid),backgroundColor:'#2F855A',borderRadius:4},
      {label:'A vencer',data:flowData.map(d=>d.due+d.future),backgroundColor:'#F6AD55',borderRadius:4},
    ]
  },options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11}}},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{x:{stacked:true,ticks:{font:{size:10}}},y:{stacked:true,display:false}}}});
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const k=kpis();
  app.innerHTML=renderHeader(k)+`<div class="content fade-in">`+
    (S.tab==='dash'?renderDash(k):
     S.tab==='list'?renderList():
     S.tab==='form'?renderForm():
     S.tab==='fluxo'?renderFluxo():
     renderSettings())+
    `</div>`+renderNav();
  if(S.tab==='dash') setTimeout(()=>{
    const bySeg=getChartData().bySeg; const byAmb=getChartData().byAmb;
    buildBarChart('segChart',bySeg,'name','val');
    buildBarChart('ambChart',byAmb,'name','val');
  },60);
  if(S.tab==='fluxo') setTimeout(()=>buildFlowChart('flowChart',getMonthlyFlow()),60);
  attachEvents();
}

function getChartData(){
  const bySeg=SEGMENTOS.map(seg=>({name:seg.split('/')[0].trim().slice(0,16),full:seg,val:S.txs.filter(t=>t.segmento===seg).reduce((s,t)=>s+t.valorTotal,0)})).filter(d=>d.val>0).sort((a,b)=>b.val-a.val).slice(0,9);
  const byAmb=CENTROS.map(c=>({name:c.length>14?c.slice(0,14)+'…':c,val:S.txs.filter(t=>t.centro===c).reduce((s,t)=>s+t.valorTotal,0)})).filter(d=>d.val>0).sort((a,b)=>b.val-a.val);
  return{bySeg,byAmb};
}

function filtered(){
  return S.txs.filter(t=>{
    const hay=[t.descricao,t.fornecedor,t.segmento,t.centro,t.forma].join(' ').toLowerCase();
    return(!S.search||hay.includes(S.search.toLowerCase()))&&(!S.segFilter||t.segmento===S.segFilter);
  });
}

// ── FLUXO ─────────────────────────────────────────────────────────
function renderFluxo(){
  const{fluxoAno:y,fluxoMes:m}=S;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const allParc=getAllInstallments();
  const mesParcelas=allParc.filter(p=>p.dataVenc.getMonth()+1===m&&p.dataVenc.getFullYear()===y);
  const flow=getMonthlyFlow();

  const pgMes=mesParcelas.filter(p=>p.pago).reduce((s,p)=>s+p.valor,0);
  const vencMes=mesParcelas.filter(p=>!p.pago&&!p.atrasado).reduce((s,p)=>s+p.valor,0);
  const atrasadoMes=mesParcelas.filter(p=>p.atrasado).reduce((s,p)=>s+p.valor,0);

  // Also add à vista payments for this month
  const avistaMes=S.txs.filter(t=>{
    if(t.status!=='Pago à Vista')return false;
    const dt=parseDate(t.data);
    return dt&&dt.getMonth()+1===m&&dt.getFullYear()===y;
  }).reduce((s,t)=>s+t.valorTotal,0);

  // Future months with commitments
  const futureMonths=flow.filter(f=>f.year>y||(f.year===y&&f.month>m)).slice(0,12);

  return`
    <div class="mes-nav">
      <button class="mes-nav-btn" onclick="prevMes()">‹</button>
      <div class="mes-title">${fmtMes(y,m)}</div>
      <button class="mes-nav-btn" onclick="nextMes()">›</button>
    </div>

    <div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="kpi" style="border-left:4px solid #276749;padding:12px">
        <div class="kpi-val" style="color:#276749;font-size:14px">${fmt(pgMes+avistaMes)}</div>
        <div class="kpi-label">✅ Pago</div>
      </div>
      <div class="kpi" style="border-left:4px solid #B7791F;padding:12px">
        <div class="kpi-val" style="color:#B7791F;font-size:14px">${fmt(vencMes)}</div>
        <div class="kpi-label">📅 A vencer</div>
      </div>
      <div class="kpi" style="border-left:4px solid #C53030;padding:12px">
        <div class="kpi-val" style="color:#C53030;font-size:14px">${fmt(atrasadoMes)}</div>
        <div class="kpi-label">🔴 Atrasado</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">📅 Vencimentos em ${MESES[m-1]}</div>
      ${mesParcelas.length===0&&avistaMes===0?`<div style="text-align:center;padding:20px;color:#A0AEC0;font-size:13px">Nenhum vencimento neste mês</div>`:''}
      ${S.txs.filter(t=>{if(t.status!=='Pago à Vista')return false;const dt=parseDate(t.data);return dt&&dt.getMonth()+1===m&&dt.getFullYear()===y;}).map(t=>`
        <div class="parc-card">
          <div class="parc-day" style="background:#C6F6D5;color:#276749">${parseDate(t.data).getDate()}</div>
          <div class="parc-info">
            <div class="parc-desc">${esc(t.descricao)}</div>
            <div class="parc-sub">${esc(t.fornecedor||'')} · À vista</div>
          </div>
          <div style="text-align:right">
            <div class="parc-valor">${fmt(t.valorTotal)}</div>
            <span style="font-size:10px;background:#C6F6D5;color:#276749;padding:2px 7px;border-radius:99px;font-weight:700">✓ Pago</span>
          </div>
        </div>
      `).join('')}
      ${mesParcelas.sort((a,b)=>a.dataVenc-b.dataVenc).map(p=>{
        const bg=p.pago?'#C6F6D5':p.atrasado?'#FED7D7':'#FEFCBF';
        const fc=p.pago?'#276749':p.atrasado?'#C53030':'#744210';
        return`<div class="parc-card">
          <div class="parc-day" style="background:${bg};color:${fc}">${p.dataVenc.getDate()}</div>
          <div class="parc-info">
            <div class="parc-desc">${esc(p.txDesc)}</div>
            <div class="parc-sub">${esc(p.txFornecedor||'')} · Parc ${p.numero}/${p.total} · ${fmt(p.valor)}</div>
          </div>
          <div style="text-align:right">
            ${p.pago
              ?`<span style="font-size:10px;background:#C6F6D5;color:#276749;padding:2px 8px;border-radius:99px;font-weight:700">✓ Pago</span>`
              :`<button class="parc-btn" style="background:${p.atrasado?'#FED7D7':'#FEFCBF'};color:${p.atrasado?'#C53030':'#744210'};border:1.5px solid ${p.atrasado?'#FEB2B2':'#F6E05E'}" onclick="pagarParcela('${p.txId}')">
                ${p.atrasado?'🔴 Pagar':'Pagar'}
              </button>`}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <div class="section-title">📈 Fluxo Mensal</div>
      <canvas id="flowChart" height="160"></canvas>
      ${flow.length===0?`<div style="text-align:center;padding:20px;color:#A0AEC0;font-size:13px">Sem dados suficientes</div>`:''}
    </div>

    ${futureMonths.length>0?`<div class="card">
      <div class="section-title">🔮 Compromissos Futuros</div>
      ${futureMonths.map(f=>`
        <div class="flow-month-row">
          <div class="flow-month-label">${f.label}</div>
          <div class="flow-month-values">
            <div class="flow-month-total">${fmt(f.due+f.future)}</div>
            <div class="flow-month-detail">${f.due+f.future>0?`${Math.round(((f.due+f.future)/(f.paid+f.due+f.future))*100)}% a vencer`:''}</div>
          </div>
        </div>
      `).join('')}
    </div>`:''}
  `;
}

// ── SETTINGS ─────────────────────────────────────────────────────
function renderSettings(){
  const key=localStorage.getItem('anthropic_key')||'';
  return`
    <div class="card">
      <div class="section-title">🤖 API Anthropic (leitura de PDF)</div>
      <p style="font-size:12px;color:#718096;margin-bottom:12px;line-height:1.6">Salva só neste dispositivo — nunca vai ao servidor.</p>
      <div class="field"><label class="field-label">API Key</label><input class="input" id="apiKeyInput" type="password" value="${esc(key)}" placeholder="sk-ant-…"></div>
      <button class="btn btn-primary btn-sm" onclick="saveApiKey()">Salvar Key</button>
      ${key?`<button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="clearApiKey()">Apagar</button>`:''}
    </div>
    <div class="card">
      <div class="section-title">💰 Orçamento</div>
      <div class="field"><label class="field-label">Valor total previsto (R$)</label><input class="input" id="orcSettingsInput" type="number" value="${S.orc||''}" placeholder="Ex: 150000"></div>
      <button class="btn btn-primary btn-sm" onclick="saveOrcSettings()">Salvar</button>
    </div>
    <div class="card">
      <div class="section-title">ℹ️ Projeto</div>
      <p style="font-size:12px;color:#718096;line-height:1.8"><strong>Responsáveis:</strong> Rodrigo &amp; Daniela<br><strong>Lançamentos:</strong> ${S.txs.length}<br><strong>Total contratado:</strong> ${fmt(S.txs.reduce((s,t)=>s+t.valorTotal,0))}</p>
    </div>
  `;
}

// ── HANDLERS ─────────────────────────────────────────────────────
function attachEvents(){
  const drop=document.getElementById('pdfDrop');
  if(drop){
    drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
    drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
    drop.addEventListener('drop',e=>{e.preventDefault();handlePdfFile(e.dataTransfer.files[0]);});
  }
}

function setTab(tab){S.tab=tab;render();}
function setOrcEdit(v){S.orcEdit=v;render();}
function prevMes(){S.fluxoMes--;if(S.fluxoMes<1){S.fluxoMes=12;S.fluxoAno--;}render();}
function nextMes(){S.fluxoMes++;if(S.fluxoMes>12){S.fluxoMes=1;S.fluxoAno++;}render();}

function startNew(){S.form=emptyForm();S.form.data=today();S.editId=null;S.tab='form';render();}

function startEdit(id){
  const tx=S.txs.find(t=>t.id===id);if(!tx)return;
  S.form={data:tx.data,descricao:tx.descricao,fornecedor:tx.fornecedor||'',segmento:tx.segmento||'',centro:tx.centro||'',forma:tx.forma||'Pix',valorTotal:String(tx.valorTotal||''),totalParcelas:String(tx.totalParcelas||1),parcelasPagas:String(tx.parcelasPagas||0),valorParcela:String(tx.valorParcela||''),dataPrimeiraParcela:tx.dataPrimeiraParcela||'',status:tx.status||'Pago à Vista',obs:tx.obs||''};
  S.editId=id;S.tab='form';render();
}

function cancelForm(){S.form=emptyForm();S.editId=null;S.tab='list';render();}

function updateSearch(v){S.search=v;document.querySelector('.content').innerHTML=renderList();attachEvents();}
function updateSegFilter(v){S.segFilter=v;document.querySelector('.content').innerHTML=renderList();attachEvents();}

function onStatusChange(val){
  const el=document.getElementById('parcSection');
  if(el)el.style.display=val.includes('Parcelado')?'':'none';
}

function onValorChange(){
  const vt=parseFloat(document.getElementById('f_valorTotal')?.value)||0;
  const pc=parseInt(document.getElementById('f_totalParcelas')?.value)||1;
  const vp=document.getElementById('f_valorParcela');
  if(vp&&pc>0) vp.value=(vt/pc).toFixed(2);
}

function onParcelasChange(){
  const vt=parseFloat(document.getElementById('f_valorTotal')?.value)||0;
  const pc=parseInt(document.getElementById('f_totalParcelas')?.value)||1;
  const vp=document.getElementById('f_valorParcela');
  if(vp&&vt>0) vp.value=(vt/pc).toFixed(2);
}

function readForm(){
  const g=id=>document.getElementById(id)?.value||'';
  return{data:g('f_data'),descricao:g('f_descricao'),fornecedor:g('f_fornecedor'),segmento:g('f_segmento'),centro:g('f_centro'),forma:g('f_forma'),status:g('f_status'),valorTotal:g('f_valorTotal'),totalParcelas:g('f_totalParcelas'),parcelasPagas:g('f_parcelasPagas'),valorParcela:g('f_valorParcela'),dataPrimeiraParcela:g('f_dataPrimeiraParcela'),obs:g('f_obs'),cartaoNome:g('f_cartaoNome'),cartaoNumero:g('f_cartaoNumero'),cartaoBandeira:g('f_cartaoBandeira'),cartaoVencimento:g('f_cartaoVencimento')};
}

async function handleSave(){
  const f=readForm();
  if(!f.descricao.trim()||!f.valorTotal){showToast('⚠️ Preencha Descrição e Valor','err');return;}
  if(S.saving)return;
  S.saving=true;
  const btn=document.getElementById('saveBtn');if(btn)btn.textContent='Salvando…';
  const vt=parseFloat(f.valorTotal)||0;
  const tp=parseInt(f.totalParcelas)||1;
  const pp=Math.min(parseInt(f.parcelasPagas)||0,tp);
  const vp=parseFloat(f.valorParcela)||vt;
  const totalPago=f.status==='Pago à Vista'||f.status==='Parcelado Quitado'?vt:f.status==='Parcelado em Andamento'?pp*vp:0;
  const tx={id:S.editId||uid(),data:f.data,descricao:f.descricao.trim(),fornecedor:f.fornecedor,segmento:f.segmento,centro:f.centro,forma:f.forma,valorTotal:vt,totalParcelas:tp,parcelasPagas:pp,valorParcela:vp,totalPago:Math.min(totalPago,vt),status:f.status,dataPrimeiraParcela:f.dataPrimeiraParcela,obs:f.obs,cartaoNome:f.cartaoNome,cartaoNumero:f.cartaoNumero,cartaoBandeira:f.cartaoBandeira,cartaoVencimento:f.cartaoVencimento,createdAt:S.editId?(S.txs.find(t=>t.id===S.editId)?.createdAt||new Date().toISOString()):new Date().toISOString()};
  try{
    await upsertTx(tx);
    showToast(S.editId?'✅ Atualizado!':'✅ Salvo!');
    S.form=emptyForm();S.editId=null;S.tab='list';
  }catch(e){showToast('⚠️ Erro ao salvar: '+e.message,'err');}
  S.saving=false;render();
}

async function confirmDelete(id){
  if(!confirm('Remover este lançamento?'))return;
  try{await deleteTxById(id);showToast('🗑️ Removido');render();}
  catch(e){showToast('⚠️ Erro','err');}
}

async function pagarParcela(txId){
  const tx=S.txs.find(t=>t.id===txId);if(!tx)return;
  const novasPagas=Math.min((tx.parcelasPagas||0)+1,tx.totalParcelas);
  const novoTotal=novasPagas*tx.valorParcela;
  const novoStatus=novasPagas>=tx.totalParcelas?'Parcelado Quitado':'Parcelado em Andamento';
  const updated={...tx,parcelasPagas:novasPagas,totalPago:novoTotal,status:novoStatus};
  const prevEdit=S.editId;S.editId=txId;
  try{await upsertTx(updated);showToast(`✅ Parcela ${novasPagas}/${tx.totalParcelas} paga!`);}
  catch(e){showToast('⚠️ Erro ao salvar','err');}
  S.editId=prevEdit;render();
}

async function saveOrcamento(){
  const v=parseFloat(document.getElementById('orcInput')?.value)||0;
  try{await persistOrc(v);S.orcEdit=false;render();showToast('✅ Orçamento salvo!');}
  catch(e){showToast('⚠️ Erro','err');}
}
async function saveOrcSettings(){
  const v=parseFloat(document.getElementById('orcSettingsInput')?.value)||0;
  try{await persistOrc(v);showToast('✅ Orçamento salvo!');}catch(e){showToast('⚠️ Erro','err');}
}

async function salvarNome(){
  const nome=(document.getElementById('nomeInput')?.value||'').trim()||'Reforma Authoria';
  S.nomeProjeto=nome;S.editandoNome=false;
  await sbFetch('reforma_config',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({chave:'nome_projeto',valor:nome})}).catch(()=>{});
  render();
}

function saveApiKey(){const key=(document.getElementById('apiKeyInput')?.value||'').trim();if(key){localStorage.setItem('anthropic_key',key);showToast('✅ Key salva!');}else{localStorage.removeItem('anthropic_key');showToast('🗑️ Key removida');}render();}
function clearApiKey(){localStorage.removeItem('anthropic_key');showToast('🗑️ Key removida');render();}
function triggerPdf(){if(!S.extracting)document.getElementById('pdfInput').click();}

async function handlePdfFile(file){
  if(!file||file.type!=='application/pdf')return;
  const apiKey=localStorage.getItem('anthropic_key');
  if(!apiKey){showToast('⚠️ Configure a API Key em ⚙️ Config','err');S.tab='settings';render();return;}
  S.extracting=true;S.tab='form';S.form=emptyForm();S.form.data=today();S.editId=null;render();
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Analise este comprovante. Retorne SOMENTE JSON:\n{"data":"DD/MM/YYYY","valor":0.00,"fornecedor":"","forma":"Pix","numero_controle":""}'}]}]})});
    const d=await resp.json();
    const txt=d.content?.find(b=>b.type==='text')?.text||'{}';
    const ex=JSON.parse(txt.replace(/```json|```/g,'').trim());
    S.form.data=ex.data||S.form.data;S.form.fornecedor=ex.fornecedor||'';S.form.forma=ex.forma||'Pix';S.form.valorTotal=ex.valor?String(ex.valor):'';S.form.valorParcela=ex.valor?String(ex.valor):'';S.form.obs=ex.numero_controle?`Ctrl Pix: ${ex.numero_controle}`:'';
    showToast('✅ Comprovante lido! Confira os dados.');
  }catch(e){showToast('⚠️ Erro ao ler PDF','err');}
  S.extracting=false;render();
}

// ── INIT ─────────────────────────────────────────────────────────
initDB();
loadAll();
</script>
